services:
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    image: ghcr.io/pudap/backend:latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env  # Path relative to compose.yml location (apps/backend/.env)
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request, sys, os; port = int(os.getenv('BACKEND_PORT', '8000')); urllib.request.urlopen(f'http://localhost:{port}/'); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

