services:
  first:
    build:
      context: ../../..
      dockerfile: machines/first/edge/Dockerfile
    image: ghcr.io/pudap/first-edge:latest
    container_name: first-edge
    restart: unless-stopped
    # Mount USB devices for serial communication and camera access
    # Note: Device paths should match QUBOT_PORT, SARTORIUS_PORT, and CAMERA_INDEX env vars
    # Docker Compose doesn't support variable substitution in devices section
    devices:
      - /dev/ttyACM0:/dev/ttyACM0  # Default qubot port (set QUBOT_PORT env var to override)
      - /dev/ttyUSB0:/dev/ttyUSB0  # Default sartorius port (set SARTORIUS_PORT env var to override)
      - /dev/video0:/dev/video0    # Default camera (set CAMERA_INDEX env var to override)
    # Alternative: Use privileged mode if device mounting doesn't work
    # privileged: true
    # Mount workspace for development (optional - allows live code changes)
    # Uncomment these volumes to enable live code reloading during development
    # volumes:
    #   - ../../libs:/app/libs:ro
    #   - ./first.py:/app/machines/first/edge/first.py:ro
    # Environment variables for device configuration
    env_file:
      - .env  # Path relative to compose.yml location (machines/first/edge/.env)
    environment:
      - QUBOT_PORT=${QUBOT_PORT:-/dev/ttyACM0}
      - SARTORIUS_PORT=${SARTORIUS_PORT:-/dev/ttyUSB0}
      - CAMERA_INDEX=${CAMERA_INDEX:-0}
      - MACHINE_ID=${MACHINE_ID:-first}
      - NATS_SERVERS=${NATS_SERVERS:-nats://192.168.50.201:4222,nats://192.168.50.201:4223,nats://192.168.50.201:4224}
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
