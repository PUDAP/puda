services:
  nats1:
    image: nats:2.12.2
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats1:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    environment:
      - SERVER_NAME=nats1
    command: "-c /etc/nats/nats.conf"

  nats2:
    image: nats:2.12.2
    ports:
      - "4223:4222"
      - "8223:8222"
    volumes:
      - nats2:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    environment:
      - SERVER_NAME=nats2
    command: "-c /etc/nats/nats.conf"

  nats3:
    image: nats:2.12.2
    ports:
      - "4224:4222"
      - "8224:8222"
    volumes:
      - nats3:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    environment:
      - SERVER_NAME=nats3
    command: "-c /etc/nats/nats.conf"

networks:
  nats:
    name: nats

volumes:
  nats1:
    external: true
  nats2:
    external: true
  nats3:
    external: true
