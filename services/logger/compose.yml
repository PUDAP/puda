services:
  logger:
    build:
      context: ../..
      dockerfile: services/logger/Dockerfile
    image: ghcr.io/pudap/logger:latest
    container_name: logger
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
