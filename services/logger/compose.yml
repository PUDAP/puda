services:
  logger:
    build:
      context: ../..
      dockerfile: services/logger/Dockerfile
    image: ghcr.io/pudap/logger:latest
    container_name: logger
    restart: unless-stopped
    environment:
      - NATS_SERVERS=${NATS_SERVERS:-nats://localhost:4222}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-puda}
      - POSTGRES_USER=${POSTGRES_USER:-puda}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

