services:
  first-mcp:
    build:
      context: ../../..
      dockerfile: services/first/mcp/Dockerfile
    image: ghcr.io/pudap/first-mcp:latest
    container_name: first-mcp
    restart: unless-stopped
    ports:
      - "${FIRST_MCP_PORT:-8001}:${FIRST_MCP_PORT:-8001}"
    env_file:
      - .env  # Path relative to compose.yml location (services/first/mcp/.env)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys, os; port = int(os.getenv('FIRST_MCP_PORT', '8001')); urllib.request.urlopen(f'http://localhost:{port}/health'); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s