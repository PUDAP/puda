services:
  first-mcp:
    build:
      context: ../../..
      dockerfile: services/first/mcp/Dockerfile
    image: ghcr.io/pudap/first-mcp:latest
    container_name: first-mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - FIRST_MCP_PORT=8001
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8001)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

